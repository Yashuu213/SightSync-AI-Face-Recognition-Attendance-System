<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SightSync | {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <style>
        :root {
            --primary: #7B61FF;
            --secondary: #00E396;
            --bg-dark: #080A15;
            --card-bg: #11131E; 
            --border: #1E2235;
            --text-main: #FFFFFF;
            --text-dim: #8A92A6;
            --danger: #FF4560;
            --success: #00E396;
            --warning: #FEB019;
            --info: #008FFB;
            --glass-blur: 15px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Luxurious Background ── */
        .app-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: var(--bg-dark);
        }

        /* ── Modern Layout ── */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Cyber Sidebar ── */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand {
            margin-bottom: 40px;
            padding: 0 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img { 
            height: 40px; 
            width: 40px; 
            border-radius: 50%; 
            object-fit: cover; 
            background: linear-gradient(135deg, var(--primary), var(--info));
            padding: 2px;
            box-shadow: 0 0 15px rgba(123, 97, 255, 0.4);
        }
        .brand-text { display: flex; flex-direction: column; }
        .main-brand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; color: #fff; letter-spacing: 1px; }
        .sub-brand { font-size: 0.65rem; color: var(--text-dim); }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .nav-link {
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-link i { font-size: 1.1rem; width: 24px; text-align: center; transition: color 0.2s; }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-link.active {
            background: linear-gradient(90deg, rgba(123, 97, 255, 0.8) 0%, rgba(123, 97, 255, 0.2) 100%);
            color: #fff;
            border: 1px solid rgba(123, 97, 255, 0.3);
            box-shadow: 0 4px 15px rgba(123, 97, 255, 0.15);
        }
        .nav-link.active i { color: #fff; }

        /* ── Main Workspace ── */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 24px 32px;
            min-height: 100vh;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .search-bar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 300px;
        }

        .search-bar i { color: var(--text-dim); }
        .search-bar input {
            background: transparent; border: none; color: #fff; outline: none; width: 100%;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem;
        }
        .search-bar .shortcut {
            background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px;
            font-size: 0.7rem; color: var(--text-dim); font-weight: 600;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-profile img {
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
        }

        .admin-info { display: flex; flex-direction: column; }
        .admin-info strong { font-size: 0.85rem; font-weight: 600; }
        .admin-info small { font-size: 0.7rem; color: var(--text-dim); }

        .top-icons {
            display: flex; gap: 16px; margin-right: 20px; color: var(--text-dim); font-size: 1.1rem;
        }
        .top-icons i { cursor: pointer; transition: color 0.2s; position: relative; }
        .top-icons i:hover { color: #fff; }
        .top-icons .badge {
            position: absolute; top: 0px; right: -4px; width: 8px; height: 8px;
            background: var(--primary); border-radius: 50%; border: 2px solid var(--bg-dark);
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
        }

        /* ── Global Card Design ── */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .glass-card:hover {
            border-color: rgba(255,255,255,0.15);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ── Mobile Responsive ── */
        .mobile-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main { margin-left: 0; padding: 20px; }
            .mobile-btn { display: block; }
        }

    </style>
</head>
<body>
    <div class="app-bg"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SightSync">
                <div class="brand-text">
                    <span class="main-brand">SIGHTSYNC</span>
                    <span class="sub-brand">AI_MATRIX_V2</span>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint=='index' %}active{% endif %}">
                    <i class="fa-solid fa-layer-group"></i>Dashboard
                </a>
                <a href="{{ url_for('view_employees') }}" class="nav-link {% if request.endpoint=='view_employees' %}active{% endif %}">
                    <i class="fa-solid fa-dna"></i>Employees
                </a>
                <a href="{{ url_for('add_employee_route') }}" class="nav-link {% if request.endpoint=='add_employee_route' %}active{% endif %}">
                    <i class="fa-solid fa-plus-square"></i>Register
                </a>
                <a href="{{ url_for('attendance') }}" class="nav-link {% if request.endpoint=='attendance' %}active{% endif %}">
                    <i class="fa-solid fa-crosshairs"></i>Live Recognition
                </a>
                <a href="{{ url_for('user_panel') }}" class="nav-link" target="_blank">
                    <i class="fa-solid fa-expand"></i>Kiosk Mode
                </a>
                <a href="{{ url_for('history') }}" class="nav-link {% if request.endpoint=='history' %}active{% endif %}">
                    <i class="fa-solid fa-microchip"></i>Event Logs
                </a>
                <a href="{{ url_for('my_attendance') }}" class="nav-link" target="_blank">
                    <i class="fa-solid fa-user-astronaut"></i>My Records
                </a>
                <a href="{{ url_for('export_excel') }}" class="nav-link" style="border-top: 1px solid var(--border); border-radius: 0; padding-top: 25px; margin-top: 15px;">
                    <i class="fa-solid fa-file-export"></i>Export Data
                </a>
            </nav>

            <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border);">
                <div class="admin-profile" style="margin-bottom: 15px;">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=7B61FF&color=fff" alt="Admin">
                    <div class="admin-info">
                        <strong>System Admin</strong>
                        <small>Admin</small>
                    </div>
                </div>
                <a href="{{ url_for('logout') }}" class="nav-link" style="color: var(--danger);">
                    <i class="fa-solid fa-power-off"></i>System Exit
                </a>
            </div>
        </aside>

        <main class="main">
            <!-- Mobile Toggle Only -->
            <button class="mobile-btn" id="menuToggle" style="margin-bottom: 15px;"><i class="fa-solid fa-bars-staggered"></i></button>
            
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');

        if(menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });
        }

        // Auto-close on link click (mobile)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if(window.innerWidth <= 1024) sidebar.classList.remove('active');
            });
        });
    </script>
</body>
</html>
