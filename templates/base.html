<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keya Fusion | {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
</head>

<body>
  <div class="layout">
    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="brand">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Keya Fusion" style="height: 48px; width: auto;">
      </div>
      <nav>
        <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint=='index'        %}active{% endif %}"><i
            class="fa-solid fa-gauge-high"></i>Dashboard</a>
        <a href="{{ url_for('view_employees') }}"
          class="nav-link {% if request.endpoint=='view_employees'   %}active{% endif %}"><i
            class="fa-solid fa-users"></i>Employees</a>
        <a href="{{ url_for('add_employee_route') }}"
          class="nav-link {% if request.endpoint=='add_employee_route'%}active{% endif %}"><i
            class="fa-solid fa-user-plus"></i>Add Employee</a>
        <a href="{{ url_for('attendance') }}"
          class="nav-link {% if request.endpoint=='attendance'        %}active{% endif %}"><i
            class="fa-solid fa-camera"></i>Live Attendance</a>
        <a href="{{ url_for('user_panel') }}" class="nav-link" target="_blank"><i class="fa-solid fa-display"></i>Kiosk
          Mode (User)</a>
        <a href="{{ url_for('history') }}"
          class="nav-link {% if request.endpoint=='history'           %}active{% endif %}"><i
            class="fa-solid fa-clock-rotate-left"></i>History</a>
        <a href="{{ url_for('my_attendance') }}" class="nav-link" target="_blank"><i class="fa-solid fa-calendar-days"></i>My Attendance</a>
        <a href="{{ url_for('export_excel') }}" class="nav-link"><i class="fa-solid fa-file-excel"></i>Export Excel</a>
        <a href="{{ url_for('logout') }}" class="nav-link" style="color: #ef4444; margin-top: 15px;"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
      </nav>
    </aside>

    <!-- ── Main ── -->
    <div class="main">
      <header class="topbar">
        <div style="display: flex; align-items: center;">
          <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h2>{{ self.title() }}</h2>
        </div>
        <div class="topbar-right">
          <div class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Admin</div>
        </div>
      </header>
      <div class="page-content">
        {% block content %}{% endblock %}
      </div>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const mobileBtn = document.getElementById('mobileMenuBtn');
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      function toggleSidebar() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
      }

      if (mobileBtn && sidebar && overlay) {
        mobileBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
        
        // Close sidebar when clicking a link on mobile
        const navLinks = sidebar.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
          link.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
              toggleSidebar();
            }
          });
        });
      }
    });
  </script>
</body>

</html>
