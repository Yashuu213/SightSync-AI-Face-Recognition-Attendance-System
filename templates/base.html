<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SightSync | {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --danger: #ff3e3e;
            --success: #00ff88;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Dynamic Background ── */
        .app-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
        }

        /* ── Modern Layout ── */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Cyber Sidebar ── */
        .sidebar {
            width: 280px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand {
            margin-bottom: 50px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand img { height: 45px; filter: drop-shadow(0 0 10px var(--primary)); }
        .brand span { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 0.9rem; color: #fff; }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-link {
            padding: 14px 20px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link i { font-size: 1.1rem; width: 24px; text-align: center; }

        .nav-link:hover {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            border-color: rgba(0, 242, 255, 0.1);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: rgba(0, 242, 255, 0.1);
            color: var(--primary);
            border-color: rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
        }

        /* ── Main Workspace ── */
        .main {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            min-height: 100vh;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .page-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .admin-profile i { color: var(--primary); }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .system-status {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-left: 1px solid var(--border);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .main-brand {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 0.9rem;
            color: #fff;
        }

        .sub-brand {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--primary);
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ── Global Card Design (3D Ready) ── */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ── Mobile Responsive ── */
        .mobile-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main { margin-left: 0; padding: 20px; }
            .mobile-btn { display: block; }
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="app-bg"></div>
    <div class="scanlines"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SightSync">
                <div class="brand-text">
                    <span class="main-brand">SIGHTSYNC</span>
                    <span class="sub-brand">AI_MATRIX_V2</span>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint=='index' %}active{% endif %}">
                    <i class="fa-solid fa-layer-group"></i>Dashboard
                </a>
                <a href="{{ url_for('view_employees') }}" class="nav-link {% if request.endpoint=='view_employees' %}active{% endif %}">
                    <i class="fa-solid fa-dna"></i>Employees
                </a>
                <a href="{{ url_for('add_employee_route') }}" class="nav-link {% if request.endpoint=='add_employee_route' %}active{% endif %}">
                    <i class="fa-solid fa-plus-square"></i>Register
                </a>
                <a href="{{ url_for('attendance') }}" class="nav-link {% if request.endpoint=='attendance' %}active{% endif %}">
                    <i class="fa-solid fa-crosshairs"></i>Live Recognition
                </a>
                <a href="{{ url_for('user_panel') }}" class="nav-link" target="_blank">
                    <i class="fa-solid fa-expand"></i>Kiosk Mode
                </a>
                <a href="{{ url_for('history') }}" class="nav-link {% if request.endpoint=='history' %}active{% endif %}">
                    <i class="fa-solid fa-microchip"></i>Event Logs
                </a>
                <a href="{{ url_for('my_attendance') }}" class="nav-link" target="_blank">
                    <i class="fa-solid fa-user-astronaut"></i>My Records
                </a>
                <a href="{{ url_for('export_excel') }}" class="nav-link" style="border-top: 1px solid var(--border); border-radius: 0; padding-top: 25px; margin-top: 15px;">
                    <i class="fa-solid fa-file-export"></i>Export Data
                </a>
            </nav>

            <div style="margin-top: 20px;">
                <a href="{{ url_for('logout') }}" class="nav-link" style="color: var(--danger);">
                    <i class="fa-solid fa-power-off"></i>System Exit
                </a>
            </div>
        </aside>

        <main class="main">
            <header class="top-bar">
                <div style="display: flex; align-items: center; gap: 24px;">
                    <button class="mobile-btn" id="menuToggle"><i class="fa-solid fa-bars-staggered"></i></button>
                    <div class="page-title">
                        <span style="opacity: 0.4; margin-right: 10px;">SYSTEM_PATH //</span>
                        <span style="color: var(--primary); font-weight: 700;">{{ self.title()|upper }}</span>
                    </div>
                </div>
                <div class="top-bar-actions">
                    <div class="system-status">
                        <span class="pulse-dot"></span>
                        NETWORK_SECURE
                    </div>
                    <div class="admin-profile">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span style="font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;">ADMIN_SESSION</span>
                    </div>
                </div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');

        if(menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });
        }

        // Auto-close on link click (mobile)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if(window.innerWidth <= 1024) sidebar.classList.remove('active');
            });
        });
    </script>
</body>
</html>
