<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SightSync | Attendance Kiosk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --accent: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --success: #10b981;
            --error: #ef4444;
            --border: #e2e8f0;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card-bg: #0f172a;
                --text-main: #f8fafc;
                --text-dim: #94a3b8;
                --border: rgba(255, 255, 255, 0.05);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand img { height: 40px; width: auto; }
        .time-box { text-align: right; }
        #clock { font-size: 1.25rem; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }
        #date { font-size: 0.85rem; color: var(--text-dim); font-weight: 500; }

        main {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%;
        }

        .kiosk-container { width: 100%; display: flex; gap: 40px; align-items: center; }
        .camera-side { flex: 1; position: relative; }

        .camera-wrapper {
            position: relative; width: 100%; aspect-ratio: 4/3;
            background: #000; border-radius: var(--radius-lg); overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 4px solid var(--card-bg);
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlay { position: absolute; inset: 0; z-index: 5; width: 100%; height: 100%; }

        .scanner-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to bottom, transparent, var(--primary));
            box-shadow: 0 0 20px var(--primary);
            animation: scan 3s ease-in-out infinite;
            z-index: 10; display: none;
        }

        @keyframes scan {
            0%, 100% { top: 10%; opacity: 0.1; }
            50% { top: 90%; opacity: 0.8; }
        }

        .info-side { width: 360px; display: flex; flex-direction: column; gap: 20px; }

        .status-card {
            background: var(--card-bg); padding: 30px; border-radius: var(--radius-lg);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border); text-align: center;
        }

        .status-header {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-dim); font-weight: 700; margin-bottom: 20px;
        }

        .status-indicator {
            width: 80px; height: 80px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; border-radius: 20px; background: var(--bg);
            color: var(--text-dim); transition: all 0.3s;
        }

        .status-text { font-size: 1.25rem; font-weight: 700; line-height: 1.4; }

        .state-scanning .status-indicator { color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        .state-success .status-indicator { color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .state-error .status-indicator { color: var(--error); background: rgba(239, 68, 68, 0.1); }

        .btn-kiosk {
            padding: 18px; border: none; border-radius: var(--radius-md);
            background: var(--primary-gradient); color: white;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center;
            justify-content: center; gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-kiosk:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4); }
        .btn-kiosk:active { transform: scale(0.98); }

        .btn-exit {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: white;
            padding: 10px 20px; border-radius: 12px; font-size: 0.9rem;
            font-weight: 700; display: none; align-items: center; gap: 8px;
            cursor: pointer; z-index: 30; transition: all 0.2s;
        }

        .btn-exit:hover { background: var(--error); }

        .hud-card {
            position: absolute; top: 20px; right: 20px; width: 300px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateX(350px); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20; color: #0f172a;
        }

        @media (prefers-color-scheme: dark) {
            .hud-card { background: rgba(15, 23, 42, 0.9); border-color: rgba(255, 255, 255, 0.05); color: #f8fafc; }
        }

        .hud-card.active { transform: translateX(0); }
        .hud-header { display: flex; align-items: center; gap: 12px; }
        .hud-avatar {
            width: 48px; height: 48px; background: var(--primary-gradient);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.25rem;
        }
        .hud-info h4 { font-size: 1rem; font-weight: 800; }
        .hud-info p { font-size: 0.8rem; color: var(--text-dim); }

        .hud-badge {
            padding: 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 800;
            text-transform: uppercase; text-align: center;
        }
        .hud-badge.in { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .hud-badge.out { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }

        @media (max-width: 850px) {
            main { padding: 20px; }
            .kiosk-container { flex-direction: column; }
            .info-side { width: 100%; max-width: 400px; }
            header { padding: 15px 20px; }
        }
    </style>
</head>

<body class="state-idle">

    <header>
        <div class="brand">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="SightSync">
        </div>
        <div class="time-box">
            <div id="clock">00:00:00</div>
            <div id="date">Loading...</div>
        </div>
    </header>

    <main>
        <div class="kiosk-container">
            <div class="camera-side">
                <div class="camera-wrapper">
                    <video id="video" autoplay playsinline muted></video>
                    <button id="btnExitOverlay" class="btn-exit" onclick="stopKiosk()">
                        <i class="fa-solid fa-arrow-left"></i> Exit Kiosk
                    </button>
                    <canvas id="overlay"></canvas>
                    <div class="scanner-line" id="scanner"></div>

                    <div class="hud-card" id="hudCard">
                        <div class="hud-header">
                            <div class="hud-avatar" id="hudAvatar">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div class="hud-info">
                                <h4 id="hudName">Identifying...</h4>
                                <p id="hudDetail">Scanning face...</p>
                            </div>
                        </div>
                        <div class="hud-badge" id="hudStatusBadge">SECURE</div>
                    </div>
                </div>
            </div>

            <div class="info-side">
                <div class="status-card" id="statusCard">
                    <div class="status-header">System Status</div>
                    <div class="status-indicator" id="statusIcon">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                    <div class="status-text" id="statusText">Ready to Start</div>
                </div>

                <button class="btn-kiosk" id="btnStart" onclick="startKiosk()">
                    <i class="fa-solid fa-play"></i> Start Kiosk
                </button>
                <button class="btn-kiosk" id="btnStop" onclick="stopKiosk()" style="display: none; background: var(--text-dim);">
                    <i class="fa-solid fa-stop"></i> Stop Monitoring
                </button>

                <p style="text-align: center; color: var(--text-dim); font-size: 0.85rem; font-weight: 500;">
                    Position yourself in the frame for 1 second.
                </p>
            </div>
        </div>
        
        <audio id="successSound" src="{{ url_for('static', filename='audio/success.wav') }}" preload="auto"></audio>
        <audio id="morningSound" src="{{ url_for('static', filename='audio/Morning.wav') }}" preload="auto"></audio>
        <audio id="byeSound" src="{{ url_for('static', filename='audio/Bye.wav') }}" preload="auto"></audio>
    </main>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const btnExitOverlay = document.getElementById('btnExitOverlay');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        const hudCard = document.getElementById('hudCard');
        const scanner = document.getElementById('scanner');
        const successSound = document.getElementById('successSound');
        const morningSound = document.getElementById('morningSound');
        const byeSound = document.getElementById('byeSound');
        const ctx = overlay.getContext('2d');
        const cap = document.createElement('canvas');
        const capCtx = cap.getContext('2d');

        const seenFor = {};
        const markedOn = {};
        const idToName = {};
        const THRESHOLD = 1;
        const COOLDOWN = 3000;
        let isBusy = false;
        let isMarking = false; // Added variable
        let loopTimer = null;
        let isKioskRunning = false;
        let currentStream = null;
        let sessionTimeout = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function playSound(audioEl) {
            if (!audioEl) return;
            audioEl.currentTime = 0;
            audioEl.play().catch(e => console.warn("Audio failed:", e));
        }

        function getGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return "Good Morning";
            if (hour < 17) return "Good Afternoon";
            return "Good Evening";
        }

        function showHud(name, status, type = 'info') {
            document.getElementById('hudName').textContent = name;
            document.getElementById('hudDetail').textContent = status;
            const badge = document.getElementById('hudStatusBadge');
            badge.textContent = type === 'in' ? 'SHIFT STARTED' : (type === 'out' ? 'WORK COMPLETED' : 'SECURE');
            badge.className = 'hud-badge ' + type;
            hudCard.classList.add('active');
            setTimeout(() => hudCard.classList.remove('active'), 4000);
        }

        async function startKiosk() {
            if (isKioskRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                currentStream = stream;
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    overlay.width = cap.width = video.videoWidth;
                    overlay.height = cap.height = video.videoHeight;
                    loopTimer = setInterval(processFrame, 250);
                };

                isKioskRunning = true;
                btnStart.style.display = 'none';
                btnStop.style.display = 'flex';
                btnExitOverlay.style.display = 'flex';
                scanner.style.display = 'block';
                updateStatus('state-scanning', '<i class="fa-solid fa-spinner fa-spin"></i>', 'Monitoring...');

                if (sessionTimeout) clearTimeout(sessionTimeout);
                sessionTimeout = setTimeout(() => { if (isKioskRunning) stopKiosk(); }, 300000);

            } catch (e) {
                updateStatus('state-error', '<i class="fa-solid fa-circle-xmark"></i>', 'Camera access denied.');
                alert('Camera access denied or error.');
            }
        }

        function stopKiosk() {
            if (loopTimer) clearInterval(loopTimer);
            if (sessionTimeout) clearTimeout(sessionTimeout);
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            
            video.srcObject = null;
            scanner.style.display = 'none';
            btnExitOverlay.style.display = 'none';
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            
            isKioskRunning = false;
            btnStart.style.display = 'flex';
            btnStop.style.display = 'none';
            updateStatus('state-idle', '<i class="fa-solid fa-camera"></i>', 'Ready to Start');
        }

        function updateStatus(stateCls, iconHtml, text) {
            document.body.className = stateCls || 'state-idle';
            statusIcon.innerHTML = iconHtml;
            statusText.innerHTML = text;
        }

        async function processFrame() {
            if (!video.videoWidth || !isKioskRunning || isBusy) return;
            isBusy = true;

            capCtx.drawImage(video, 0, 0, cap.width, cap.height);
            const frame = cap.toDataURL('image/jpeg', 0.4);

            try {
                const res = await fetch('/api/recognise', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ frame })
                });
                const data = await res.json();
                if (data.success) {
                    const faces = data.faces || [];
                    faces.forEach(f => { if (f.id !== 'Unknown') idToName[f.id] = f.name; });
                    drawBoxes(faces);
                    handleAttendance(faces);
                }
            } catch (e) {} finally { isBusy = false; }
        }

        function drawBoxes(faces) {
            const W = overlay.width;
            ctx.clearRect(0, 0, overlay.width, overlay.height);

            faces.forEach(f => {
                const { top, right, bottom, left } = f.box;
                const known = f.id !== 'Unknown';
                const centerX = W - (left + (right - left) / 2);

                ctx.beginPath();
                ctx.strokeStyle = known ? '#10b981' : '#ef4444';
                ctx.lineWidth = 3;
                ctx.rect(W - right, top, right - left, bottom - top);
                ctx.stroke();

                ctx.fillStyle = known ? '#10b981' : '#ef4444';
                ctx.font = 'bold 14px Inter, sans-serif';
                const label = (f.id === 'Unknown') ? 'Unknown' : `${f.name} (${Math.round((1-f.dist)*100)}%)`;
                const tw = ctx.measureText(label).width;
                ctx.fillRect(W - right, top - 30, tw + 20, 30);
                ctx.fillStyle = '#fff';
                ctx.fillText(label, W - right + 10, top - 10);
            });
        }

        async function handleAttendance(faces) {
            const nowIds = new Set(faces.map(f => f.id).filter(id => id !== 'Unknown'));

            Object.keys(seenFor).forEach(id => {
                if (!nowIds.has(id)) seenFor[id] = Math.max(0, seenFor[id] - 1);
            });

            if (nowIds.size === 0) {
                if (faces.length > 0 && !isMarking) {
                    updateStatus('state-error', '<i class="fa-solid fa-circle-question"></i>', 'Unknown face detected.');
                } else if (!isMarking) {
                    updateStatus('state-scanning', '<i class="fa-solid fa-spinner fa-spin"></i>', 'Monitoring...');
                }
                return;
            }

            for (const f of faces) {
                const id = f.id;
                if (id === 'Unknown') continue;

                seenFor[id] = (seenFor[id] || 0) + 1;
                const now = Date.now();
                const lastMark = markedOn[id] || 0;
                const inCooldown = (now - lastMark) < COOLDOWN;
                const displayName = f.name || id;

                if (inCooldown) continue;

                if (seenFor[id] >= THRESHOLD && !isMarking) {
                    isMarking = true;
                    updateStatus('state-scanning', '<i class="fa-solid fa-spinner fa-spin"></i>', `Marking ${displayName}...`);

                    try {
                        const res = await fetch('/api/mark', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ employee_id: id })
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            markedOn[id] = now;
                            let sIcon = '<i class="fa-solid fa-circle-check"></i>';
                            let sState = 'state-success';
                            let sText = `Welcome, ${displayName}!`;
                            
                            if (data.type === 'IN') {
                                playSound(morningSound);
                                showHud(displayName, 'SHIFT STARTED: ' + getGreeting(), 'in');
                            } else if (data.type === 'OUT') {
                                playSound(byeSound);
                                showHud(displayName, 'WORK COMPLETED: Have a nice day!', 'out');
                                sState = 'state-success';
                                sIcon = '<i class="fa-solid fa-door-open"></i>';
                                sText = `Goodbye, ${displayName}!`;
                            } else {
                                playSound(successSound);
                                showHud(displayName, 'LOGGED: ' + data.message, 'info');
                            }

                            updateStatus(sState, sIcon, sText);
                            setTimeout(() => {
                                if (isKioskRunning) updateStatus('state-scanning', '<i class="fa-solid fa-spinner fa-spin"></i>', 'Monitoring...');
                            }, 2000);
                        } else {
                            updateStatus('state-error', '<i class="fa-solid fa-circle-exclamation"></i>', data.message || 'Error marking attendance.');
                        }
                    } catch (e) {
                        console.error("Mark failed:", e);
                    } finally {
                        setTimeout(() => { isMarking = false; }, 800);
                    }
                }
            }
        }
    </script>
</body>
</html>
