<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance | Keya Fusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            color: var(--gray-800);
            min-height: 100vh;
        }

        /* ── Splash / Login Screen ── */
        #splash {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .auth-card img { height: 60px; margin-bottom: 20px; }
        .auth-card h2 { margin-bottom: 10px; font-weight: 700; color: var(--gray-800); }
        .auth-card p { color: var(--gray-600); margin-bottom: 30px; line-height: 1.5; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--primary); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--primary-dark); }

        /* ── Main Dashboard ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: none; /* Hidden by default */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar {
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--gray-300);
            padding: 10px 20px;
            border-radius: 8px;
            color: var(--gray-600);
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: var(--gray-100); color: var(--error); border-color: var(--error); }

        /* ── Calendar UI ── */
        .calendar-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .calendar-header {
            padding: 24px;
            background: white;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calendar-controls { display: flex; gap: 10px; align-items: center; }
        .calendar-controls button {
            background: var(--gray-100);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-600);
            transition: all 0.2s;
        }
        .calendar-controls button:hover { background: var(--gray-200); transform: scale(1.05); }

        /* ── Swipe Support ── */
        .calendar-body {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Momentum scrolling for iOS */
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 10px;
            background: white;
        }

        .weekday {
            text-align: center;
            font-weight: 700;
            color: var(--gray-600);
            padding: 20px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 2px solid var(--gray-100);
        }

        .day {
            min-height: 140px;
            border: 1px solid #f1f5f9;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            transition: background 0.15s;
        }

        .day.other-month { opacity: 0.4; pointer-events: none; background: #fbfcfd; }
        .day-num { font-weight: 700; font-size: 1.1rem; color: var(--gray-600); }
        .day.today { background: #eff6ff; border: 2px solid var(--primary); z-index: 1; border-radius: 4px; }
        .day.today .day-num { color: var(--primary); }

        .status-badge {
            font-size: 0.7rem;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-present { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-absent { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .status-leave { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .status-holiday { background: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }

        .time-info {
            font-size: 0.75rem;
            color: var(--gray-600);
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--gray-100);
        }
        .time-row { display: flex; justify-content: space-between; align-items: center; }
        .time-label { font-size: 0.65rem; font-weight: 600; color: var(--gray-300); text-transform: uppercase; }
        .time-val { font-weight: 800; color: var(--gray-800); }
        .time-info i { width: 14px; text-align: center; margin-right: 4px; color: var(--primary); font-size: 0.8rem; }

        .ot-tag {
            color: #d97706;
            font-weight: 800;
            font-size: 0.65rem;
            text-align: right;
            padding-top: 4px;
            border-top: 1px dashed var(--gray-200);
        }

        /* ── Summary Cards ── */
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: white;
            padding: 30px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--gray-200);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-card .val { font-size: 1.8rem; font-weight: 800; line-height: 1; }
        .stat-card .label { color: var(--gray-600); font-size: 0.9rem; font-weight: 500; }

        /* ── Responsive Overrides ── */
        @media (max-width: 1024px) {
            .container { padding: 30px 15px; }
            .day { min-height: 120px; }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; }
            .logout-btn { align-self: flex-end; width: auto; font-size: 0.8rem; padding: 8px 16px; }
            
            .calendar-grid { 
                min-width: 700px; /* Force scroll on small mobiles */
            }
            
            .day { min-height: 100px; padding: 10px; }
            .day-num { font-size: 1rem; }
            .time-info { padding: 6px; }
            .time-label { display: none; }
            
            .stat-card { padding: 20px; }
            .stat-card .val { font-size: 1.5rem; }
        }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <!-- Auth Splash -->
    <div id="splash">
        <div class="auth-card">
            <img src="/static/img/logo.png" alt="Logo">
            <h2>Track Your Growth</h2>
            <p>Enter your Employee ID to view your customized attendance calendar.</p>
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" id="idInput" placeholder="E.g. EMP101" autofocus>
            </div>
            <button class="btn-primary" id="loginBtn">Show My Calendar</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainDashboard">
        <header>
            <div class="user-info">
                <div class="user-avatar" id="avatar">?</div>
                <div>
                    <h1 id="userName" style="font-size: 1.5rem;">Employee Dashboard</h1>
                    <p style="color: var(--gray-600); font-size: 0.9rem; font-weight: 600;" id="userEid">ID: ---</p>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Change ID</button>
        </header>

        <div class="calendar-card">
            <div class="calendar-header">
                <h2 id="monthTitle" style="font-size: 1.2rem; font-weight: 800; color: var(--gray-800);">Month Year</h2>
                <div class="calendar-controls">
                    <button id="prevMonth" title="Previous Month"><i class="fa-solid fa-chevron-left"></i></button>
                    <button id="nextMonth" title="Next Month"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            
            <div class="calendar-body">
                <div class="calendar-grid" id="calendarGrid">
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                    <div class="weekday">Sun</div>
                </div>
            </div>
        </div>

        <div id="loader" class="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Fetching records...</div>

        <div class="summary-stats">
            <div class="stat-card">
                <div class="stat-icon" style="background: #dcfce7; color: #166534;"><i class="fa-solid fa-user-check"></i></div>
                <div>
                    <span class="val" style="color: var(--success);" id="statPresent">0</span>
                    <span class="label">Days Present</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #fee2e2; color: #991b1b;"><i class="fa-solid fa-user-xmark"></i></div>
                <div>
                    <span class="val" style="color: var(--error);" id="statAbsent">0</span>
                    <span class="label">Days Absent</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #fef3c7; color: #92400e;"><i class="fa-solid fa-business-time"></i></div>
                <div>
                    <span class="val" style="color: var(--warning);" id="statOvertime">0h</span>
                    <span class="label">Total Overtime</span>
                </div>
            </div>
        </div>

        <footer style="margin-top: 50px; text-align: center; color: var(--gray-300); font-size: 0.8rem; padding-bottom: 20px;">
            <p>&copy; 2026 Keya Fusion. Secure Face Attendance System.</p>
        </footer>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const container = document.getElementById('mainDashboard');
        const idInput = document.getElementById('idInput');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const grid = document.getElementById('calendarGrid');
        const monthTitle = document.getElementById('monthTitle');
        const loader = document.getElementById('loader');

        let currentId = null;
        let displayedMonth = new Date().getMonth() + 1;
        let displayedYear = new Date().getFullYear();

        // ── Auth Logic ──
        function initApp() {
            const savedId = localStorage.getItem('myEmployeeId');
            if (savedId) {
                currentId = savedId;
                showDashboard();
            }
        }

        loginBtn.addEventListener('click', () => {
            const id = idInput.value.trim();
            if (id) {
                currentId = id;
                localStorage.setItem('myEmployeeId', id);
                showDashboard();
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('myEmployeeId');
            location.reload();
        });

        function showDashboard() {
            splash.style.display = 'none';
            container.style.display = 'block';
            document.getElementById('userEid').textContent = 'ID: ' + currentId;
            fetchAttendance();
        }

        // ── Calendar Logic ──
        async function fetchAttendance() {
            loader.style.display = 'block';
            grid.innerHTML = `
                <div class="weekday">Mon</div><div class="weekday">Tue</div><div class="weekday">Wed</div>
                <div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div><div class="weekday">Sun</div>
            `;
            
            try {
                const res = await fetch('/api/get_my_attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        employee_id: currentId,
                        month: displayedMonth,
                        year: displayedYear
                    })
                });
                const data = await res.json();
                if (data.success) {
                    if (data.name && data.name !== "Unknown") {
                        document.getElementById('userName').textContent = data.name;
                        document.getElementById('avatar').textContent = data.name.charAt(0).toUpperCase();
                    }
                    renderCalendar(data.logs);
                }
            } catch (e) {
                console.error(e);
            }
            loader.style.display = 'none';
        }

        function renderCalendar(logs) {
            const date = new Date(displayedYear, displayedMonth - 1, 1);
            monthTitle.textContent = date.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

            // Start of month padding
            let firstDay = date.getDay(); // 0=Sun, 1=Mon...
            if (firstDay === 0) firstDay = 7; // Align to Mon-Sun grid
            
            for (let i = 1; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day other-month';
                grid.appendChild(empty);
            }

            const daysInMonth = new Date(displayedYear, displayedMonth, 0).getDate();
            const today = new Date();
            let pCount = 0;
            let aCount = 0;
            let totalOTMin = 0;

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${displayedYear}-${String(displayedMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const log = logs.find(l => l.date === dateStr);
                
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                if (today.getFullYear() === displayedYear && today.getMonth() === displayedMonth - 1 && today.getDate() === d) {
                    dayEl.classList.add('today');
                }

                let html = `<span class="day-num">${d}</span>`;
                
                if (log) {
                    if (log.login === 'Sick Leave' || log.login === 'Paid Leave') {
                        html += `<span class="status-badge status-leave">${log.login}</span>`;
                    } else if (log.login === 'Absent') {
                        html += `<span class="status-badge status-absent">Absent</span>`;
                        aCount++;
                    } else if (log.login) {
                        pCount++;
                        html += `
                            <div class="time-info">
                                <div class="time-row">
                                    <span class="time-label">In</span>
                                    <span class="time-val"><i class="fa-solid fa-right-to-bracket"></i>${log.login}</span>
                                </div>
                                <div class="time-row">
                                    <span class="time-label">Out</span>
                                    <span class="time-val"><i class="fa-solid fa-right-from-bracket"></i>${log.logout || '---'}</span>
                                </div>
                            </div>
                        `;

                        // OT Calculation (Simplified JS version for UI)
                        if (log.logout && log.logout !== '-') {
                            const outT = log.logout.split(':');
                            const otTime = 17 * 60 + 45; // 17:45 threshold
                            const outMin = parseInt(outT[0]) * 60 + parseInt(outT[1]);
                            if (outMin > otTime) {
                                const diff = outMin - otTime;
                                totalOTMin += diff;
                                html += `<span class="ot-tag"><i class="fa-solid fa-bolt"></i> OT: ${Math.floor(diff/60)}h ${diff%60}m</span>`;
                            }
                        }
                    }
                } else {
                    // Weekend check
                    const dayOfWeek = new Date(displayedYear, displayedMonth - 1, d).getDay();
                    if (dayOfWeek === 0) { // Sunday
                        html += `<span class="status-badge status-holiday">Holiday</span>`;
                    } else {
                        // Logic for past dates with no logs
                        const iterateDate = new Date(displayedYear, displayedMonth -1, d);
                        const cleanToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                        if (iterateDate < cleanToday) {
                            html += `<span class="status-badge status-absent">Absent</span>`;
                            aCount++;
                        }
                    }
                }

                dayEl.innerHTML = html;
                grid.appendChild(dayEl);
            }

            document.getElementById('statPresent').textContent = pCount;
            document.getElementById('statAbsent').textContent = aCount;
            document.getElementById('statOvertime').textContent = `${Math.floor(totalOTMin/60)}h ${totalOTMin%60}m`;
        }

        document.getElementById('prevMonth').onclick = () => {
            displayedMonth--;
            if (displayedMonth === 0) { displayedMonth = 12; displayedYear--; }
            fetchAttendance();
        };

        document.getElementById('nextMonth').onclick = () => {
            displayedMonth++;
            if (displayedMonth === 13) { displayedMonth = 1; displayedYear++; }
            fetchAttendance();
        };

            // Optional: Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (container.style.display === 'block') {
            if (e.key === 'ArrowLeft') document.getElementById('prevMonth').click();
            if (e.key === 'ArrowRight') document.getElementById('nextMonth').click();
        }
    });

        initApp();
    </script>
</body>
</html>
