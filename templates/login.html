<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SightSync | Authentication Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --card-bg: rgba(10, 10, 10, 0.4);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* ── Futuristic Particle Background ── */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        /* ── 3D Cyber Card ── */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 20px;
            padding: 60px 45px;
            width: 100%;
            max-width: 480px;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            overflow: hidden;
        }

        /* Animated Border */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary));
            animation: rotate 6s linear infinite;
            z-index: -1;
        }

        .login-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0a0a0a;
            border-radius: 18px;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Logo & Title ── */
        .scanner-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scanner-logo img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            filter: drop-shadow(var(--neon-glow)); 
            z-index: 5;
        }

        .scanner-ring {
            position: absolute;
            inset: 0;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            animation: spin 10s linear infinite;
            opacity: 0.5;
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            animation: scan 4s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes scan {
            0%, 100% { top: 0; opacity: 0; }
            50% { top: 100%; opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            color: #fff;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        p.status-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            color: var(--primary);
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* ── Futuristic Inputs ── */
        .form-group {
            margin-bottom: 30px;
            text-align: left;
            position: relative;
        }

        .input-box {
            position: relative;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .input-box i {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1rem;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 15px 15px 15px 35px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            font-family: 'Space Grotesk', sans-serif;
        }

        .input-focus-line {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.4s ease;
        }

        input:focus ~ .input-focus-line { width: 100%; }
        input:focus ~ i { color: var(--primary); }

        /* ── Cyber Button ── */
        .btn-cyber {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 20px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            margin-top: 10px;
            border-radius: 4px;
        }

        .btn-cyber::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            transition: all 0.4s;
            z-index: -1;
        }

        .btn-cyber:hover { color: #000; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        .btn-cyber:hover::before { left: 0; }

        .btn-cyber:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── HUD Elements ── */
        .hud-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--primary);
            opacity: 0.5;
        }

        .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        #message {
            margin-top: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }

        .error { color: #ff3e3e; }
        .success { color: #00ff88; }

        .terminal-footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="scan-overlay"></div>

    <div class="login-card" id="tilt-card">
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>

        <div class="scanner-logo">
            <div class="scanner-ring"></div>
            <div class="scanner-line"></div>
            <img src="/static/img/logo.png" alt="SightSync">
        </div>

        <h1>SightSync</h1>
        <p class="status-text">Identity Authentication Required</p>

        <form id="authTerminal">
            <div class="form-group">
                <div class="input-box">
                    <i class="fa-solid fa-user-secret"></i>
                    <input type="email" id="email" placeholder="ADMIN_ACCESS_ID" required autocomplete="email">
                    <div class="input-focus-line"></div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-box">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" placeholder="ENCRYPTED_KEY" required autocomplete="current-password">
                    <div class="input-focus-line"></div>
                </div>
            </div>

            <div id="message"></div>

            <button type="submit" class="btn-cyber" id="submitBtn">
                <span>Authorize</span>
            </button>
        </form>
    </div>

    <div class="terminal-footer">
        [ SYSTEM_V6.4 ] // AUTH_NODE_ALPHA // &copy; SIGHT_SYNC_INFRA
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>

        // --- Particle Background ---
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            }
        });

        // --- Form Logic ---
        const form = document.getElementById('authTerminal');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('span');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Terminal State
            message.style.display = 'block';
            message.textContent = "> VERIFYING_ENCRYPTION_HASH...";
            message.className = "";
            submitBtn.disabled = true;
            btnText.textContent = "WAIT...";

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    message.textContent = "> ACCESS_GRANTED. INITIALIZING_CORE...";
                    message.className = "success";
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    message.textContent = "> ACCESS_DENIED: INVALID_CREDENTIALS";
                    message.className = "error";
                    submitBtn.disabled = false;
                    btnText.textContent = "RETRY";
                }
            } catch (err) {
                message.textContent = "> ERR: NETWORK_LINK_FAILURE";
                message.className = "error";
                submitBtn.disabled = false;
                btnText.textContent = "RETRY";
            }
        });
    </script>
</body>
</html>
