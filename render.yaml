services:
  # 1. SightSync AI Unified System (Admin + User Panel)
  # Admin is at "/" and User Kiosk is at "/user"
  - type: web
    name: sightsync-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false # Set this to your Supabase URL in Render Dashboard
      - key: PYTHON_VERSION
        value: 3.10.12
